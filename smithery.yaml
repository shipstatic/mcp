# Smithery configuration file: https://smithery.ai/docs/config

startCommand:
  type: stdio

configSchema:
  type: object
  required:
    - shipApiKey
  properties:
    shipApiKey:
      type: string
      description: Your Shipstatic API key for authentication.

commandFunction:
  |-
  (config) => ({ command: 'npx', args: ['-y', '@shipstatic/mcp'], env: { SHIP_API_KEY: config.shipApiKey } })
